name: Package VSCode Extension

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'vscode-extension/**'
      - '.github/workflows/vscode-extension-package.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vscode-extension-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Build and package .vsix
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate extension files
        run: npm run check

      - name: Package VSCode extension
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-commit-sao-hua-vsix
          path: vscode-extension/git-commit-sao-hua.vsix
          if-no-files-found: error

      - name: Publish VSIX to rolling dev release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: ncipollo/release-action@v1
        with:
          tag: dev
          name: Development Build
          body: |
            自动更新的开发版 VSIX。

            - Branch: `${{ github.ref_name }}`
            - Commit: `${{ github.sha }}`
            - Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            下载下方附件中的 `git-commit-sao-hua.vsix` 即可安装。
          artifacts: vscode-extension/git-commit-sao-hua.vsix
          artifactErrorsFailBuild: true
          allowUpdates: true
          prerelease: true
          removeArtifacts: true
          replacesArtifacts: true
          commit: ${{ github.sha }}

      - name: Attach VSIX to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: vscode-extension/git-commit-sao-hua.vsix
          generate_release_notes: true
