                <option value="zha">💔 扎心模式</option>

        </div>

        <div class="form-group">
            <label for="description">📄 简短描述（可选）</label>
            <input type="text" id="description" placeholder="例如：用户登录功能">
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="generate()">✨ 生成骚话 Commit</button>
            <button class="btn btn-random" onclick="randomGenerate()">🎲 随机生成</button>
        </div>

        <div class="result" id="result">
            <div class="result-label">生成的 Commit Message：</div>

                <button class="btn btn-secondary" onclick="copyResult()">📋 复制</button>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
        // 历史记录管理
        const HISTORY_KEY = 'git_sao_hua_history';
        const MAX_HISTORY = 10;

        function getHistory() {
            try {
                return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
            } catch (e) {
                return [];
            }
        }

        function saveToHistory(commitType, style, text, description) {
            const history = getHistory();
            const item = {
                id: Date.now(),
                type: commitType,
                style: style,
                text: text,
                description: description,
                createdAt: new Date().toISOString()
            };
            history.unshift(item);
            if (history.length > MAX_HISTORY) {
                history.pop();
            }
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const history = getHistory();
            const container = document.getElementById('historyList');
            
            if (history.length === 0) {
                container.innerHTML = '<div class="history-empty">暂无历史记录</div>';
                return;
            }

            container.innerHTML = history.map(item => `
                <div class="history-item" onclick="loadHistory(${item.id})">
                    <div class="type">${item.type} · ${getStyleName(item.style)}</div>
                    <div class="text">${item.text.substring(0, 50)}${item.text.length > 50 ? '...' : ''}</div>
                </div>
            `).join('');
        }

        function loadHistory(id) {
            const history = getHistory();
            const item = history.find(h => h.id === id);
            if (!item) return;

            document.getElementById('commitType').value = item.type;
            document.getElementById('style').value = item.style;
            document.getElementById('description').value = item.description || '';
            
            const result = item.description ? `${item.type}: ${item.description}\n\n${item.text}` : `${item.type}: ${item.text}`;
            document.getElementById('resultText').textContent = result;
            document.getElementById('result').classList.add('show');
            lastResult = result;
            
            // 滚动到顶部
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function clearHistory() {
            if (confirm('确定要清空历史记录吗？')) {
                localStorage.removeItem(HISTORY_KEY);
                renderHistory();
            }
        }

        function getStyleName(style) {
            const names = {
                love: '💕 情话',
                sao: '😏 骚话',
                zha: '💔 扎心',
                chu: '😤 中二',
                fo: '🙏 佛系'
            };
            return names[style] || style;
        }

        // 随机生成
        function randomGenerate() {
            const types = Object.keys(saoHuaDB);
            const styles = ['love', 'sao', 'zha', 'chu', 'fo'];
            
            const randomType = types[Math.floor(Math.random() * types.length)];
            const randomStyle = styles[Math.floor(Math.random() * styles.length)];
            
            document.getElementById('commitType').value = randomType;
            document.getElementById('style').value = randomStyle;
            
            // 添加抖动动画
            const btn = document.querySelector('.btn-random');
            btn.classList.add('shake');
            setTimeout(() => btn.classList.remove('shake'), 500);
            
            generate();
        }

        // 分享功能
        function showShare() {
            document.getElementById('shareModal').classList.add('show');
        }

        function closeShare() {
            document.getElementById('shareModal').classList.remove('show');
        }

        function shareToWeChat() {
            const text = lastResult || 'Git Commit 骚话生成器';
            const url = window.location.href;
            const shareText = encodeURIComponent(`${text}\n\n来自 Git Commit 骚话生成器：${url}`);
            
            // 微信分享需要扫描二维码，这里显示二维码
            const qrContainer = document.querySelector('.share-content');
            const existingQr = document.getElementById('qrCode');
            if (existingQr) existingQr.remove();
            
            const qrDiv = document.createElement('div');
            qrDiv.id = 'qrCode';
            qrDiv.className = 'qr-code';
            qrDiv.style.display = 'block';
            qrContainer.insertBefore(qrDiv, document.querySelector('.share-buttons'));
            
            new QRCode(qrDiv, {
                text: shareText,
                width: 200,
                height: 200
            });
            
            alert('请用微信扫描二维码分享');
        }

        function shareToWeibo() {
            const text = lastResult || 'Git Commit 骚话生成器';
            const url = window.location.href;
            const shareUrl = `https://service.weibo.com/share/share.php?title=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`;
            window.open(shareUrl, '_blank');
        }

        function copyShareLink() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                showToast();
                closeShare();
            });
        }

        let lastResult = '';

        function generate() {
            const commitType = document.getElementById('commitType').value;
            const style = document.getElementById('style').value;
            const description = document.getElementById('description').value.trim();

            const messages = saoHuaDB[commitType][style];
            const randomMessage = messages[Math.floor(Math.random() * messages.length)];

            let result;
            if (description) {
                result = `${commitType}: ${description}\n\n${randomMessage}`;
            } else {
                result = `${commitType}: ${randomMessage}`;
            }

            lastResult = result;
            document.getElementById('resultText').textContent = result;
            document.getElementById('result').classList.add('show');
            
            // 保存到历史记录
            saveToHistory(commitType, style, randomMessage, description);
        }

        function copyResult() {
            if (!lastResult) return;

            navigator.clipboard.writeText(lastResult).then(() => {
                showToast();
            }).catch(err => {
                // Fallback for older browsers
                const textarea = document.createElement('textarea');
                textarea.value = lastResult;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast();
            });
        }

        function regenerate() {
            generate();
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // 支持回车生成
        document.getElementById('description').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generate();
            }
        });

        // 页面加载时渲染历史记录
        window.addEventListener('DOMContentLoaded', renderHistory);
