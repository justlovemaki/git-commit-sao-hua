<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Commit 骚话生成器 💕</title>
    <meta name="description" content="让每次 Git 提交都充满爱意（或骚气）！支持 12 种类型 × 5 种风格，还有每日一句、成就系统哦~">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💕</text></svg>">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #ff6b6b, #feca57, #ff6b6b);
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent-color: #ff6b6b;
            --success-color: #4caf50;
            --warning-color: #ff9800;
        }

        .light-theme {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --card-border: rgba(0, 0, 0, 0.1);
            --text-primary: #2d3748;
            --text-secondary: #718096;
            --accent-color: #e53e3e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 1.8em;
            background: var(--primary-gradient);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 3s ease infinite;
        }

        @keyframes gradient {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 100% center; }
        }

        .theme-toggle {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            cursor: pointer;
            font-size: 1.2em;
            transition: all 0.3s ease;
            min-height: 48px;
            min-width: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle:hover {
            transform: rotate(180deg);
            background: rgba(255, 255, 255, 0.2);
        }

        .theme-toggle:active {
            transform: scale(0.9);
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .daily-quote {
            background: rgba(255, 107, 107, 0.1);
            border-left: 4px solid var(--accent-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .daily-quote-icon {
            font-size: 1.5em;
        }

        .daily-quote-text {
            flex: 1;
            font-size: 0.9em;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9em;
        }

        select, input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .light-theme select, .light-theme input[type="text"] {
            background: rgba(255, 255, 255, 0.8);
            border-color: rgba(0, 0, 0, 0.1);
        }

        select:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
        }

        select option {
            background: #1a1a2e;
            color: #fff;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: #fff;
            font-weight: bold;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn-group .btn {
            flex: 1;
        }

        .btn-random {
            background: linear-gradient(135deg, #a29bfe, #6c5ce7);
            color: #fff;
        }

        .btn-random:hover {
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.4);
        }

        .shake {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-favorite {
            background: rgba(255, 107, 107, 0.2);
            color: var(--accent-color);
        }

        .btn-favorite.active {
            background: var(--accent-color);
            color: #fff;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            border-left: 4px solid var(--accent-color);
            display: none;
        }

        .result.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-label {
            color: var(--text-secondary);
            font-size: 0.85em;
            margin-bottom: 10px;
        }

        .result-text {
            font-size: 1.1em;
            line-height: 1.6;
            color: var(--text-primary);
            word-break: break-all;
            white-space: pre-wrap;
        }

        .result-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .result-actions .btn {
            flex: 1;
            margin-bottom: 0;
            font-size: 0.9em;
            padding: 10px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: var(--accent-color);
        }

        .stat-label {
            font-size: 0.8em;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 10px;
        }

        .tab {
            padding: 8px 16px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .tab:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .tab.active {
            background: var(--accent-color);
            color: #fff;
        }

        .history-section, .favorites-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--card-border);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .history-title, .favorites-title {
            color: var(--text-secondary);
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .history-list, .favorites-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item, .favorite-item {
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            border-left: 3px solid var(--accent-color);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .light-theme .history-item, .light-theme .favorite-item {
            background: rgba(0, 0, 0, 0.05);
        }

        .history-item:hover, .favorite-item:hover {
            background: rgba(0, 0, 0, 0.3);
            transform: translateX(5px);
        }

        .history-item .type, .favorite-item .type {
            font-size: 0.8em;
            color: var(--accent-color);
            margin-bottom: 5px;
        }

        .history-item .text, .favorite-item .text {
            font-size: 0.9em;
            color: var(--text-primary);
            line-height: 1.4;
        }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            padding: 30px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--success-color);
            color: #fff;
            padding: 15px 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .share-modal, .achievements-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .share-modal.show, .achievements-modal.show {
            display: flex;
        }

        .share-content, .achievements-content {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .light-theme .share-content, .light-theme .achievements-content {
            background: #fff;
        }

        .share-content h3, .achievements-content h3 {
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .share-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .share-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .share-btn-wechat {
            background: #07c160;
            color: #fff;
        }

        .share-btn-weibo {
            background: #e6162d;
            color: #fff;
        }

        .share-btn-copy {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .share-btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .share-close, .achievements-close {
            margin-top: 15px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-secondary);
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        .share-close:hover, .achievements-close:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .qr-code {
            margin: 20px auto;
            padding: 10px;
            background: #fff;
            border-radius: 10px;
            display: none;
        }

        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .achievement-item {
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            text-align: center;
            opacity: 0.5;
            transition: all 0.3s ease;
        }

        .achievement-item.unlocked {
            opacity: 1;
            background: rgba(255, 107, 107, 0.2);
            border: 2px solid var(--accent-color);
        }

        .achievement-icon {
            font-size: 2em;
            margin-bottom: 8px;
        }

        .achievement-name {
            font-size: 0.85em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .achievement-desc {
            font-size: 0.75em;
            color: var(--text-secondary);
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: var(--text-secondary);
            font-size: 0.8em;
        }

        .footer a {
            color: var(--accent-color);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .keyboard-hints {
            text-align: center;
            margin-top: 15px;
            font-size: 0.75em;
            color: var(--text-secondary);
        }

        .keyboard-hints kbd {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            margin: 0 2px;
        }

        .light-theme .keyboard-hints kbd {
            background: rgba(0, 0, 0, 0.1);
        }

        .custom-btn {
            background: rgba(255, 107, 107, 0.2);
            border: none;
            border-radius: 8px;
            padding: 6px 12px;
            cursor: pointer;
            color: var(--accent-color);
            font-size: 0.85em;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .custom-btn:hover {
            background: var(--accent-color);
            color: #fff;
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary-gradient);
            transition: width 0.3s ease;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
                margin: 10px;
            }

            h1 {
                font-size: 1.4em;
            }

            .subtitle {
                font-size: 0.85em;
            }

            /* 按钮触摸区域最小 48px */
            .btn, select, input[type="text"], .tab, .theme-toggle {
                min-height: 48px;
                touch-action: manipulation;
            }

            /* 增大按钮点击区域 */
            .btn {
                padding: 16px 20px;
                font-size: 1em;
            }

            .btn-group {
                flex-direction: column;
                gap: 12px;
            }

            .result-actions {
                flex-direction: column;
                gap: 10px;
            }

            .result-actions .btn {
                padding: 12px;
            }

            .stats-bar {
                gap: 8px;
                flex-wrap: wrap;
                padding: 12px;
            }

            .stat-item {
                min-width: 60px;
            }

            .stat-value {
                font-size: 1.1em;
            }

            .stat-label {
                font-size: 0.7em;
            }

            .custom-btn {
                min-height: 44px;
                padding: 8px 16px;
                font-size: 0.85em;
            }

            .achievements-grid {
                grid-template-columns: 1fr;
            }

            /* 优化移动端字体 */
            body {
                font-size: 14px;
            }

            label {
                font-size: 0.85em;
                margin-bottom: 10px;
            }

            select, input[type="text"] {
                font-size: 16px; /* 防止 iOS 自动缩放 */
                padding: 14px;
            }

            .daily-quote {
                padding: 12px;
                font-size: 0.85em;
            }

            .tabs {
                gap: 8px;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            .tab {
                padding: 10px 14px;
                font-size: 0.9em;
                white-space: nowrap;
            }

            .keyboard-hints {
                font-size: 0.7em;
                margin-top: 12px;
            }

            .keyboard-hints kbd {
                padding: 3px 6px;
                font-size: 0.9em;
            }

            .history-item, .favorite-item {
                padding: 14px;
            }

            .share-content, .achievements-content, .custom-content {
                width: 95%;
                padding: 20px;
            }

            .share-buttons {
                gap: 12px;
            }

            .share-btn {
                padding: 14px;
                min-height: 48px;
            }
        }

        /* 触摸设备优化 */
        @media (hover: none) and (pointer: coarse) {
            .btn:hover {
                transform: none;
            }

            .btn:active {
                transform: scale(0.98);
            }

            .history-item:hover, .favorite-item:hover {
                transform: none;
                background: rgba(0, 0, 0, 0.25);
            }

            .theme-toggle:hover {
                transform: none;
            }

            .tab:hover {
                background: transparent;
            }

            .tab:active {
                background: rgba(255, 255, 255, 0.1);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💕 Git Commit 骚话生成器</h1>
            <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌓</button>
        </div>
        <p class="subtitle">让每次提交都充满爱意（或骚气）</p>

        <!-- 每日一句 -->
        <div class="daily-quote" id="dailyQuote">
            <span class="daily-quote-icon">💡</span>
            <span class="daily-quote-text" id="dailyQuoteText">加载中...</span>
        </div>

        <!-- 统计栏 -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">生成次数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="favoriteCount">0</div>
                <div class="stat-label">收藏夹</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="achievementCount">0/12</div>
                <div class="stat-label">成就</div>
            </div>
            <button class="custom-btn" onclick="showCustomModal()">
                <span>💕</span>
                <span>我的骚话</span>
            </button>
        </div>

        <div class="form-group">
            <label for="commitType">📝 Commit 类型</label>
            <select id="commitType">
                <option value="fix">fix - 修复 bug</option>
                <option value="feat">feat - 新功能</option>
                <option value="chore">chore - 日常维护</option>
                <option value="docs">docs - 文档更新</option>
                <option value="refactor">refactor - 代码重构</option>
                <option value="style">style - 代码格式</option>
                <option value="test">test - 测试相关</option>
                <option value="perf">perf - 性能优化</option>
                <option value="ci">ci - CI 配置</option>
                <option value="build">build - 构建系统</option>
                <option value="revert">revert - 回滚</option>
                <option value="hotfix">hotfix - 紧急修复</option>
            </select>
        </div>

        <div class="form-group">
            <label for="style">🎨 风格</label>
            <select id="style">
                <option value="love">💕 情话模式</option>
                <option value="sao">😏 骚话模式</option>
                <option value="zha">💔 扎心模式</option>
                <option value="chu">😤 中二模式</option>
                <option value="fo">🙏 佛系模式</option>
            </select>
        </div>

        <div class="form-group">
            <label for="description">📄 简短描述（可选）</label>
            <input type="text" id="description" placeholder="例如：用户登录功能">
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="generate()">✨ 生成骚话 Commit</button>
            <button class="btn btn-random" onclick="randomGenerate()">🎲 随机生成</button>
        </div>

        <div class="result" id="result">
            <div class="result-label">生成的 Commit Message：</div>
            <div class="result-text" id="resultText"></div>
            <div class="result-actions">
                <button class="btn btn-secondary" onclick="copyResult()">📋 复制</button>
                <button class="btn btn-secondary" onclick="regenerate()">🔄 换一个</button>
                <button class="btn btn-favorite" id="favoriteBtn" onclick="toggleFavorite()">⭐ 收藏</button>
                <button class="btn btn-secondary" onclick="showShare()">🔗 分享</button>
            </div>
        </div>

        <div class="keyboard-hints">
            <kbd>Enter</kbd> 生成 · <kbd>Ctrl+C</kbd> 复制 · <kbd>R</kbd> 随机 · <kbd>D</kbd> 主题
        </div>

        <!-- Tab 切换 -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('history')">📜 历史记录</button>
            <button class="tab" onclick="switchTab('favorites')">⭐ 收藏夹</button>
            <button class="tab" onclick="switchTab('achievements')">🏆 成就</button>
        </div>

        <!-- 历史记录 -->
        <div class="history-section" id="historySection">
            <div class="section-header">
                <div class="history-title">
                    <span>📜</span>
                    <span>最近生成</span>
                </div>
                <span style="cursor: pointer; color: var(--text-secondary);" onclick="clearHistory()">清空</span>

        let lastResult = '';

        // ==================== 工具函数 ====================
        // 触摸震动反馈
        function vibrate(pattern = 10) {
            if (navigator.vibrate) {
                navigator.vibrate(pattern);
            }
        }

        function getStorage(key) {
            try {
                return JSON.parse(localStorage.getItem(key)) || null;
            } catch (e) {
                return null;
            }
        }

        function setStorage(key, value) {
            try {
                localStorage.setItem(key, JSON.stringify(value));
            } catch (e) {
                console.error('Storage error:', e);
            }
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function getStyleName(style) {
            const names = {
                love: '💕 情话',
                sao: '😏 骚话',
                zha: '💔 扎心',
                chu: '😤 中二',
                fo: '🙏 佛系'
            };
            return names[style] || style;
        }

        // ==================== 统计管理 ====================
        function getStats() {
            return getStorage(STORAGE_KEYS.STATS) || {
                totalGenerates: 0,
                totalCopies: 0,
                totalShares: 0,
                totalFavorites: 0,
                typesUsed: {},
                stylesUsed: {},
                midnightGenerates: 0,
                keyboardGenerates: 0,
                themeSwitches: 0
            };
        }

        function updateStats(update) {
            const stats = getStats();
            Object.assign(stats, update);
            setStorage(STORAGE_KEYS.STATS, stats);
            updateStatsDisplay();
            checkAchievements();
        }

        function updateStatsDisplay() {
            const stats = getStats();
            document.getElementById('totalCount').textContent = stats.totalGenerates;
            document.getElementById('favoriteCount').textContent = getFavorites().length;
        }

        // ==================== 成就系统 ====================
        function getAchievements() {
            return getStorage(STORAGE_KEYS.ACHIEVEMENTS) || [];
        }

        function checkAchievements() {
            const stats = getStats();
            const unlocked = getAchievements();
            let newUnlock = false;

            ACHIEVEMENTS.forEach(achievement => {
                if (!unlocked.includes(achievement.id) && achievement.condition(stats)) {
                    unlocked.push(achievement.id);
                    newUnlock = true;
                    showToast(`🏆 解锁成就：${achievement.name}`);
                }
            });

            setStorage(STORAGE_KEYS.ACHIEVEMENTS, unlocked);
            if (newUnlock) {
                updateAchievementsDisplay();
            }
        }

        function updateAchievementsDisplay() {
            const unlocked = getAchievements();
            const progress = (unlocked.length / ACHIEVEMENTS.length) * 100;
            document.getElementById('achievementProgress').style.width = `${progress}%`;
            document.getElementById('achievementCount').textContent = `${unlocked.length}/${ACHIEVEMENTS.length}`;
        }

        function showAchievements() {
            vibrate(15);
            const unlocked = getAchievements();
            const grid = document.getElementById('achievementsGrid');
            
            grid.innerHTML = ACHIEVEMENTS.map(achievement => `
                <div class="achievement-item ${unlocked.includes(achievement.id) ? 'unlocked' : ''}">
                    <div class="achievement-icon">${achievement.icon}</div>
                    <div class="achievement-name">${achievement.name}</div>
                    <div class="achievement-desc">${achievement.desc}</div>
                </div>
            `).join('');

            document.getElementById('achievementsModal').classList.add('show');
        }

        function closeAchievements() {
            vibrate(10);
            document.getElementById('achievementsModal').classList.remove('show');
        }

        // ==================== 历史记录管理 ====================
        function getHistory() {
            return getStorage(STORAGE_KEYS.HISTORY) || [];
        }

        function saveToHistory(commitType, style, text, description, isCustom = false) {
            const history = getHistory();
            const item = {
                id: generateId(),
                type: commitType,
                style: style,
                text: text,
                description: description,
                isCustom: isCustom,
                createdAt: new Date().toISOString()
            };
            history.unshift(item);
            if (history.length > MAX_HISTORY) {
                history.pop();
            }
            setStorage(STORAGE_KEYS.HISTORY, history);
            renderHistory();
            
            // 更新统计
            const stats = getStats();
            stats.totalGenerates++;
            stats.typesUsed[commitType] = (stats.typesUsed[commitType] || 0) + 1;
            stats.stylesUsed[style] = (stats.stylesUsed[style] || 0) + 1;
            
            // 检查是否是深夜
            const hour = new Date().getHours();
            if (hour >= 23 || hour < 6) {
                stats.midnightGenerates++;
            }
            
            setStorage(STORAGE_KEYS.STATS, stats);
            updateStatsDisplay();
            checkAchievements();
        }

        function renderHistory() {
            const history = getHistory();
            const container = document.getElementById('historyList');
            
            if (history.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无历史记录</div>';
                return;
            }

            container.innerHTML = history.map(item => `
                <div class="history-item" onclick="loadHistoryItem('${item.id}')">
                    <div class="type">${item.type} · ${getStyleName(item.style)}</div>
                    <div class="text">${item.text.substring(0, 50)}${item.text.length > 50 ? '...' : ''}</div>
                </div>
            `).join('');
        }

        function loadHistoryItem(id) {
            const history = getHistory();
            const item = history.find(h => h.id === id);
            if (!item) return;

            document.getElementById('commitType').value = item.type;
            document.getElementById('style').value = item.style;
            document.getElementById('description').value = item.description || '';
            
            const result = item.description ? `${item.type}: ${item.description}\n\n${item.text}` : `${item.type}: ${item.text}`;
            document.getElementById('resultText').textContent = result;
            document.getElementById('result').classList.add('show');
            lastResult = result;
            currentGenerateId = item.id;
            
            // 检查是否已收藏
            const favorites = getFavorites();
            isFavorite = favorites.some(f => f.id === item.id);
            updateFavoriteButton();
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function clearHistory() {
            if (confirm('确定要清空历史记录吗？')) {
                vibrate(50);
                setStorage(STORAGE_KEYS.HISTORY, []);
                renderHistory();
            }
        }

        // ==================== 收藏管理 ====================
        function getFavorites() {
            return getStorage(STORAGE_KEYS.FAVORITES) || [];
        }

        function toggleFavorite() {
            if (!lastResult || !currentGenerateId) return;
            vibrate(25);

            const favorites = getFavorites();
            const index = favorites.findIndex(f => f.id === currentGenerateId);
            
            if (index > -1) {
                // 取消收藏
                favorites.splice(index, 1);
                isFavorite = false;
                showToast('❌ 已取消收藏');
            } else {
                // 添加收藏
                if (favorites.length >= MAX_FAVORITES) {
                    showToast('⚠️ 收藏夹已满');
                    return;
                }
                
                const history = getHistory();
                const item = history.find(h => h.id === currentGenerateId);
                if (item) {
                    favorites.push(item);
                    isFavorite = true;
                    showToast('⭐ 已加入收藏夹');
                    
                    // 更新统计
                    updateStats({ totalFavorites: favorites.length });
                }
            }
            
            setStorage(STORAGE_KEYS.FAVORITES, favorites);
            updateFavoriteButton();
            renderFavorites();
            updateStatsDisplay();
        }

        function updateFavoriteButton() {
            const btn = document.getElementById('favoriteBtn');
            if (isFavorite) {
                btn.classList.add('active');
                btn.textContent = '⭐ 已收藏';
            } else {
                btn.classList.remove('active');
                btn.textContent = '⭐ 收藏';
            }
        }

        function renderFavorites() {
            const favorites = getFavorites();
            const container = document.getElementById('favoritesList');
            
            if (favorites.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无收藏</div>';
                return;
            }

            container.innerHTML = favorites.map(item => `
                <div class="favorite-item" onclick="loadHistoryItem('${item.id}')">
                    <div class="type">${item.type} · ${getStyleName(item.style)}</div>
                    <div class="text">${item.text.substring(0, 50)}${item.text.length > 50 ? '...' : ''}</div>
                </div>
            `).join('');
        }

        // ==================== 自定义骚话管理 ====================
        function getCustomSaoHua() {
            return getStorage(STORAGE_KEYS.CUSTOM) || [];
        }

        function addCustomSaoHua() {
            vibrate(20);
            const commitType = document.getElementById('customCommitType').value;
            const style = document.getElementById('customStyle').value;
            const text = document.getElementById('customText').value.trim();

            if (!text) {
                showToast('⚠️ 请输入骚话内容');
                return;
            }

            const customList = getCustomSaoHua();
            customList.push({
                id: generateId(),
                type: commitType,
                style: style,
                text: text,
                createdAt: new Date().toISOString()
            });

            setStorage(STORAGE_KEYS.CUSTOM, customList);
            document.getElementById('customText').value = '';
            renderCustomList();
            showToast('✅ 骚话添加成功');
        }

        function deleteCustomSaoHua(id) {
            if (!confirm('确定要删除这条骚话吗？')) return;
            vibrate([20, 10, 20]);

            let customList = getCustomSaoHua();
            customList = customList.filter(item => item.id !== id);
            setStorage(STORAGE_KEYS.CUSTOM, customList);
            renderCustomList();
            showToast('🗑️ 已删除');
        }

        function renderCustomList() {
            const customList = getCustomSaoHua();
            const container = document.getElementById('customList');
            
            if (customList.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无自定义骚话</div>';
                return;
            }

            container.innerHTML = `
                <div class="custom-count">共 ${customList.length} 条自定义骚话，生成时有 30% 概率被选中</div>
                ${customList.map(item => `
                    <div class="custom-item">
                        <div class="custom-item-info">
                            <div class="custom-item-type">${item.type} · ${getStyleName(item.style)}</div>
                            <div class="custom-item-text">${item.text}</div>
                        </div>
                        <button class="custom-item-delete" onclick="deleteCustomSaoHua('${item.id}')">🗑️</button>
                    </div>
                `).join('')}
            `;
        }

        function exportCustomSaoHua() {
            const customList = getCustomSaoHua();
            if (customList.length === 0) {
                showToast('⚠️ 没有可导出的骚话');
                return;
            }

            const dataStr = JSON.stringify(customList, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'git_sao_hua_custom.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('✅ 已导出');
        }

        function importCustomSaoHua(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (!Array.isArray(imported)) {
                        throw new Error('Invalid format');
                    }

                    const customList = getCustomSaoHua();
                    let addedCount = 0;

                    imported.forEach(item => {
                        if (item.type && item.style && item.text) {
                            customList.push({
                                id: generateId(),
                                type: item.type,
                                style: item.style,
                                text: item.text,
                                createdAt: new Date().toISOString()
                            });
                            addedCount++;
                        }
                    });

                    setStorage(STORAGE_KEYS.CUSTOM, customList);
                    renderCustomList();
                    showToast(`✅ 成功导入 ${addedCount} 条骚话`);
                } catch (err) {
                    showToast('⚠️ 导入失败，文件格式错误');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function showCustomModal() {
            vibrate(15);
            document.getElementById('customModal').classList.add('show');
            renderCustomList();
        }

        function closeCustomModal() {
            vibrate(10);
            document.getElementById('customModal').classList.remove('show');
        }

        // ==================== 主题管理 ====================
        function initTheme() {
            const theme = getStorage(STORAGE_KEYS.THEME) || 'dark';
            if (theme === 'light') {
                document.body.classList.add('light-theme');
            }
        }

        function toggleTheme() {
            vibrate(15);
            document.body.classList.toggle('light-theme');
            const isLight = document.body.classList.contains('light-theme');
            setStorage(STORAGE_KEYS.THEME, isLight ? 'light' : 'dark');
            
            // 更新统计
            const stats = getStats();
            stats.themeSwitches++;
            setStorage(STORAGE_KEYS.STATS, stats);
            checkAchievements();
        }

        // ==================== 每日一句 ====================
        function loadDailyQuote() {
            const allQuotes = [];
            Object.values(saoHuaDB).forEach(type => {
                Object.values(type).forEach(style => {
                    allQuotes.push(...style);
                });
            });
            
            const today = new Date().toDateString();
            const seed = today.split('').reduce((a, b) => a + b.charCodeAt(0), 0);
            const quote = allQuotes[seed % allQuotes.length];
            
            document.getElementById('dailyQuoteText').textContent = quote;
        }

        // ==================== Tab 切换 ====================
        function switchTab(tab) {
            vibrate(15);
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('historySection').style.display = 'none';
            document.getElementById('favoritesSection').style.display = 'none';
            document.getElementById('achievementsSection').style.display = 'none';

            if (tab === 'history') {
                document.getElementById('historySection').style.display = 'block';
                renderHistory();
            } else if (tab === 'favorites') {
                document.getElementById('favoritesSection').style.display = 'block';
                renderFavorites();
            } else if (tab === 'achievements') {
                document.getElementById('achievementsSection').style.display = 'block';
                updateAchievementsDisplay();
            }
        }

        // ==================== 核心功能 ====================
        function generate(isKeyboard = false) {
            if (!isKeyboard) {
                vibrate(20);
            }
            const commitType = document.getElementById('commitType').value;
            const style = document.getElementById('style').value;
            const description = document.getElementById('description').value.trim();

            // 30% 概率从自定义骚话中选取
            const customList = getCustomSaoHua();
            const customForTypeStyle = customList.filter(c => c.type === commitType && c.style === style);
            
            let randomMessage;
            let isCustom = false;

            if (customForTypeStyle.length > 0 && Math.random() < 0.3) {
                randomMessage = customForTypeStyle[Math.floor(Math.random() * customForTypeStyle.length)].text;
                isCustom = true;
            } else {
                const messages = saoHuaDB[commitType][style];
                randomMessage = messages[Math.floor(Math.random() * messages.length)];
            }

            let result;
            if (description) {
                result = `${commitType}: ${description}\n\n${randomMessage}`;
            } else {
                result = `${commitType}: ${randomMessage}`;
            }

            lastResult = result;
            currentGenerateId = generateId();
            document.getElementById('resultText').textContent = result;
            document.getElementById('result').classList.add('show');
            isFavorite = false;
            updateFavoriteButton();
            
            saveToHistory(commitType, style, randomMessage, description, isCustom);
            
            // 更新统计
            if (isKeyboard) {
                const stats = getStats();
                stats.keyboardGenerates++;
                setStorage(STORAGE_KEYS.STATS, stats);
                checkAchievements();
            }
        }

        function randomGenerate() {
            vibrate([10, 5, 10]);
            const types = Object.keys(saoHuaDB);
            const styles = ['love', 'sao', 'zha', 'chu', 'fo'];
            
            const randomType = types[Math.floor(Math.random() * types.length)];
            const randomStyle = styles[Math.floor(Math.random() * styles.length)];
            
            document.getElementById('commitType').value = randomType;
            document.getElementById('style').value = randomStyle;
            
            const btn = document.querySelector('.btn-random');
            btn.classList.add('shake');
            setTimeout(() => btn.classList.remove('shake'), 500);
            
            generate();
        }

        function regenerate() {
            generate();
        }

        function copyResult() {
            if (!lastResult) return;
            vibrate(30);

            navigator.clipboard.writeText(lastResult).then(() => {
                showToast();
                updateStats({ totalCopies: (getStats().totalCopies || 0) + 1 });
            }).catch(err => {
                const textarea = document.createElement('textarea');
                textarea.value = lastResult;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast();
                updateStats({ totalCopies: (getStats().totalCopies || 0) + 1 });
            });
        }

        function showToast(message = '✅ 已复制到剪贴板') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // ==================== 分享功能 ====================
        function showShare() {
            vibrate(15);
            document.getElementById('shareModal').classList.add('show');
        }

        function closeShare() {
            vibrate(10);
            document.getElementById('shareModal').classList.remove('show');
        }

        function shareToWeChat() {
            vibrate(30);
            const text = lastResult || 'Git Commit 骚话生成器';
            const url = window.location.href;
            const shareText = encodeURIComponent(`${text}\n\n来自 Git Commit 骚话生成器：${url}`);
            
            const qrContainer = document.querySelector('.share-content');
            const existingQr = document.getElementById('qrCode');
            if (existingQr) existingQr.remove();
            
            const qrDiv = document.createElement('div');
            qrDiv.id = 'qrCode';
            qrDiv.className = 'qr-code';
            qrDiv.style.display = 'block';
            qrContainer.insertBefore(qrDiv, document.querySelector('.share-buttons'));
            
            new QRCode(qrDiv, {
                text: shareText,
                width: 200,
                height: 200
            });
            
            alert('请用微信扫描二维码分享');
            updateStats({ totalShares: (getStats().totalShares || 0) + 1 });
        }

        function shareToWeibo() {
            const text = lastResult || 'Git Commit 骚话生成器';
            const url = window.location.href;
            const shareUrl = `https://service.weibo.com/share/share.php?title=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`;
            window.open(shareUrl, '_blank');
            updateStats({ totalShares: (getStats().totalShares || 0) + 1 });
        }

        function copyShareLink() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                showToast();
                closeShare();
                updateStats({ totalShares: (getStats().totalShares || 0) + 1 });
            });
        }

        // ==================== 键盘快捷键 ====================
        document.addEventListener('keydown', function(e) {
            // 避免在输入框中触发
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') {
                return;
            }

            if (e.key === 'Enter') {
                generate(true);
            } else if (e.ctrlKey && e.key === 'c') {
                copyResult();
            } else if (e.key === 'r' || e.key === 'R') {
                randomGenerate();
            } else if (e.key === 'd' || e.key === 'D') {
                toggleTheme();
            }
        });

        // ==================== 初始化 ====================
        window.addEventListener('DOMContentLoaded', () => {
            initTheme();
            loadDailyQuote();
            renderHistory();
            updateStatsDisplay();
            updateAchievementsDisplay();
        });
    </script>
</body>
</html>
