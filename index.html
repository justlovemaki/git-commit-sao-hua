<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Commit 骚话生成器 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #e0e0e0;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.8em;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #ff6b6b);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 3s ease infinite;
        }

        @keyframes gradient {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 100% center; }
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #a0a0a0;
            font-size: 0.9em;
        }

        select, input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-family: inherit;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        select:focus, input[type="text"]:focus {
            outline: none;
            border-color: #ff6b6b;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
        }

        select option {
            background: #1a1a2e;
            color: #fff;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: #fff;
            font-weight: bold;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            border-left: 4px solid #ff6b6b;
            display: none;
        }

        .result.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-label {
            color: #888;
            font-size: 0.85em;
            margin-bottom: 10px;
        }

        .result-text {
            font-size: 1.1em;
            line-height: 1.6;
            color: #fff;
            word-break: break-all;
        }

        .result-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .result-actions .btn {
            flex: 1;
            margin-bottom: 0;
            font-size: 0.9em;
            padding: 10px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #4caf50;
            color: #fff;
            padding: 15px 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #666;
            font-size: 0.8em;
        }

        .footer a {
            color: #ff6b6b;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .emoji {
            font-size: 1.5em;
            margin-right: 5px;
        }
    </style>
</head>
<body>

        <p class="subtitle">让每次提交都充满爱意（或骚气）</p>

        <div class="form-group">
            <label for="commitType">📝 Commit 类型</label>
            <select id="commitType">
                <option value="fix">fix - 修复 bug</option>
                <option value="feat">feat - 新功能</option>
                <option value="chore">chore - 日常维护</option>
                <option value="docs">docs - 文档更新</option>
                <option value="refactor">refactor - 代码重构</option>
                <option value="style">style - 代码格式</option>
                <option value="test">test - 测试相关</option>
                <option value="perf">perf - 性能优化</option>
                <option value="ci">ci - CI 配置</option>
                <option value="build">build - 构建系统</option>
                <option value="revert">revert - 回滚</option>
                <option value="hotfix">hotfix - 紧急修复</option>
            </select>
        </div>

        <div class="form-group">
            <label for="style">🎨 风格</label>
            <select id="style">
                <option value="love">💕 情话模式</option>
                <option value="sao">😏 骚话模式</option>
                <option value="zha">💔 扎心模式</option>
                <option value="chu">😤 中二模式</option>
                <option value="fo">🙏 佛系模式</option>
            </select>
        </div>

        <div class="form-group">
            <label for="description">📄 简短描述（可选）</label>
            <input type="text" id="description" placeholder="例如：用户登录功能">
        </div>

        <button class="btn btn-primary" onclick="generate()">✨ 生成骚话 Commit</button>

        <div class="result" id="result">
            <div class="result-label">生成的 Commit Message：</div>
            <div class="result-text" id="resultText"></div>
            <div class="result-actions">
                <button class="btn btn-secondary" onclick="copyResult()">📋 复制</button>
                <button class="btn btn-secondary" onclick="regenerate()">🔄 换一个</button>
            </div>
        </div>

        <div class="footer">
            Made with 💕 by coding-expert | 
            <a href="https://github.com/justlovemaki" target="_blank">GitHub</a>
        </div>
    </div>

    <div class="toast" id="toast">✅ 已复制到剪贴板</div>

        let lastResult = '';

        function generate() {
            const commitType = document.getElementById('commitType').value;
            const style = document.getElementById('style').value;
            const description = document.getElementById('description').value.trim();

            const messages = saoHuaDB[commitType][style];
            const randomMessage = messages[Math.floor(Math.random() * messages.length)];

            let result;
            if (description) {
                result = `${commitType}: ${description}\n\n${randomMessage}`;
            } else {
                result = `${commitType}: ${randomMessage}`;
            }

            lastResult = result;
            document.getElementById('resultText').textContent = result;
            document.getElementById('result').classList.add('show');
        }

        function copyResult() {
            if (!lastResult) return;

            navigator.clipboard.writeText(lastResult).then(() => {
                showToast();
            }).catch(err => {
                // Fallback for older browsers
                const textarea = document.createElement('textarea');
                textarea.value = lastResult;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast();
            });
        }

        function regenerate() {
            generate();
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // 支持回车生成
        document.getElementById('description').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generate();
            }
        });

</html>
